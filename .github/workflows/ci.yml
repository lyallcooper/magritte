name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: cargo test
      - run: cargo build --release -p magritte

  linux:
    name: Linux (best effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install GPUI Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc g++ git jq lld llvm make \
            libasound2-dev libfontconfig-dev libglib2.0-dev libssl-dev \
            libva-dev libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev pipewire xdg-desktop-portal
      - uses: jdx/mise-action@v2
      - run: cargo test
      - run: cargo build --release -p magritte
