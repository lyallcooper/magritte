name: Release

# Release builds (macOS + Linux) run in the public homebrew-magritte repo,
# which also hosts the release artifacts and the formula; see its release
# workflow. This repo only dispatches the tag.

on:
  push:
    tags:
      - "v*"

env:
  BUILD_REPOSITORY: lyallcooper/homebrew-magritte

jobs:
  dispatch:
    name: Dispatch to public build repo
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api "repos/$BUILD_REPOSITORY/dispatches" \
            -f event_type=release -f "client_payload[tag]=$GITHUB_REF_NAME"
