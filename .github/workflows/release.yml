name: Release

# Builds the macOS and Linux artifacts on tag push, publishes them (with
# checksums and the rendered Homebrew formula) as a GitHub release on this
# repo, then pushes the formula update to lyallcooper/homebrew-magritte.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.8.0)"
        required: true

permissions:
  contents: write

env:
  TAP_REPOSITORY: lyallcooper/homebrew-magritte
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  macos:
    name: macOS artifact
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - uses: jdx/mise-action@v4
      - name: Build .app archive
        env:
          MAGRITTE_TARGET: aarch64-apple-darwin
        run: scripts/dist-macos.sh "${TAG#v}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            target/dist/*.tar.gz
            target/dist/*.sha256

  linux:
    name: Linux artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - name: Install GPUI Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc g++ git jq lld llvm make \
            libasound2-dev libfontconfig-dev libglib2.0-dev libssl-dev \
            libva-dev libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev pipewire xdg-desktop-portal
      - uses: jdx/mise-action@v4
      - name: Build Linux archive
        env:
          MAGRITTE_TARGET: x86_64-unknown-linux-gnu
        run: scripts/dist-linux.sh "${TAG#v}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            target/dist/*.tar.gz
            target/dist/*.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [macos, linux]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          merge-multiple: true
          path: target/dist
      - name: Render Homebrew formula
        run: scripts/render-homebrew-formula.sh "${TAG#v}"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" target/dist/*.tar.gz target/dist/*.sha256 target/dist/magritte.rb --clobber
          else
            gh release create "$TAG" target/dist/*.tar.gz target/dist/*.sha256 target/dist/magritte.rb \
              --title "Magritte $TAG" --generate-notes
          fi
      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: lyallcooper/homebrew-magritte
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Update formula
        working-directory: tap
        run: |
          cp ../target/dist/magritte.rb Formula/magritte.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/magritte.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula unchanged"
          else
            git commit -m "Update Magritte to $TAG"
            git pull --rebase origin main
            git push
          fi
      # Binaries released before v0.8.0 check the tap repo for updates; a bare
      # release there keeps their update checks working. Drop this step once
      # those versions have aged out.
      - name: Mirror release tag on tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if ! gh release view "$TAG" -R "$TAP_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$TAP_REPOSITORY" --title "Magritte $TAG" \
              --notes "Release artifacts now live at https://github.com/${{ github.repository }}/releases/tag/$TAG"
          fi
