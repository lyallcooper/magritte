name: Linux Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPOSITORY: lyallcooper/homebrew-magritte

jobs:
  linux:
    name: Linux artifact
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install GPUI Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc g++ git jq lld llvm make \
            libasound2-dev libfontconfig-dev libglib2.0-dev libssl-dev \
            libva-dev libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev pipewire xdg-desktop-portal
      - uses: jdx/mise-action@v4
      - name: Build Linux archive
        env:
          MAGRITTE_TARGET: x86_64-unknown-linux-gnu
        run: scripts/dist-linux.sh "${GITHUB_REF_NAME#v}"
      - name: Wait for macOS release publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 1 60); do
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 30
          done
          echo "Timed out waiting for ${GITHUB_REF_NAME} to be published by the macOS release workflow" >&2
          exit 1
      - name: Upload Linux assets to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/dist/*linux*.tar.gz
            target/dist/*linux*.tar.gz.sha256
      - name: Upload public Homebrew Linux assets
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "$HOMEBREW_TAP_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --repo "$HOMEBREW_TAP_REPOSITORY" target/dist/*linux*.tar.gz target/dist/*linux*.tar.gz.sha256 --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --repo "$HOMEBREW_TAP_REPOSITORY" target/dist/*linux*.tar.gz target/dist/*linux*.tar.gz.sha256 --title "Magritte ${GITHUB_REF_NAME}" --notes "Binary release artifacts for Homebrew."
          fi
      - name: Download macOS checksum from public Homebrew assets
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --pattern "*apple-darwin.tar.gz.sha256" \
            --dir target/dist \
            --clobber
      - name: Render Homebrew formula with Linux artifact
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          MAGRITTE_DOWNLOAD_REPOSITORY: ${{ env.HOMEBREW_TAP_REPOSITORY }}
        run: scripts/render-homebrew-formula.sh "${GITHUB_REF_NAME#v}"
      - name: Upload updated formula to release
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" target/dist/magritte.rb --clobber
      - name: Check out Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update Homebrew tap formula with Linux artifact
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          mkdir -p homebrew-tap/Formula
          cp target/dist/magritte.rb homebrew-tap/Formula/magritte.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/magritte.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula unchanged"
          else
            git commit -m "Add Linux artifact for ${GITHUB_REF_NAME}"
            git push
          fi
